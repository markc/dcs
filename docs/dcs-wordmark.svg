<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" width="720" height="260">
  <defs>
    <linearGradient id="shimmer" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1440" y2="0">
      <stop offset="0" stop-color="#1e6fb8"/>
      <stop offset="0.4" stop-color="#1e6fb8"/>
      <stop offset="0.5" stop-color="#87c5ff"/>
      <stop offset="0.6" stop-color="#1e6fb8"/>
      <stop offset="1" stop-color="#1e6fb8"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1440 0" to="1440 0" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>
  <g text-anchor="middle" font-family="system-ui,-apple-system,'Segoe UI',Roboto,Inter,sans-serif" font-weight="800">
    <text x="360" y="90" font-size="84" fill="url(#shimmer)">Dual Carousel</text>
    <text x="360" y="170" font-size="84" fill="#1e6fb8">Sidebars</text>
    <text x="360" y="232" font-size="40" font-weight="600" fill="url(#shimmer)">Single Page Application</text>
  </g>
</svg>
